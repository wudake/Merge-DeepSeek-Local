<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Dake视频自动化工具</title>
    
    <!-- 徽标 -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%236366f1'/%3E%3Cstop offset='100%25' style='stop-color:%238b5cf6'/%3E%3C/defs%3E%3Crect width='100' height='100' rx='22' fill='url(%23g)'/%3E%3Ctext x='50' y='68' font-size='42' text-anchor='middle' fill='white' font-family='-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif' font-weight='800' letter-spacing='-2'%3EDK%3C/text%3E%3C/svg%3E">

    <style>
        /* Ant Design 统一风格 */
        :root {
            --primary: #1677ff;
            --primary-hover: #4096ff;
            --text: #262626;
            --text-secondary: #8c8c8c;
            --bg: #f5f5f5;
            --bg-white: #ffffff;
            --border: #d9d9d9;
            --error: #ff4d4f;
            --error-bg: #fff2f0;
            --radius: 8px;
            --radius-sm: 6px;
            --shadow: 0 1px 2px 0 rgba(0,0,0,0.03), 0 1px 6px -1px rgba(0,0,0,0.02), 0 2px 4px 0 rgba(0,0,0,0.02);
            --shadow-lg: 0 9px 28px 8px rgba(0,0,0,0.05), 0 6px 16px 0 rgba(0,0,0,0.08), 0 3px 6px -4px rgba(0,0,0,0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .bg-animation { display: none; }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: var(--bg-white);
            border: 1px solid #f0f0f0;
            border-radius: var(--radius);
            padding: 40px;
            box-shadow: var(--shadow-lg);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: var(--primary);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 800;
            color: white;
            margin: 0 auto 18px;
            box-shadow: 0 4px 16px rgba(22, 119, 255, 0.3);
        }

        .logo-section h1 {
            font-size: 1.6em;
            font-weight: 700;
            color: var(--text);
        }

        .logo-section p {
            color: var(--text-secondary);
            margin-top: 6px;
            font-size: 14px;
        }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text);
            font-weight: 500;
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 9px 12px;
            background: var(--bg-white);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            color: var(--text);
            transition: all 0.2s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(22, 119, 255, 0.1);
        }

        input::placeholder { color: #bfbfbf; }

        .btn {
            width: 100%;
            padding: 9px 20px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 2px 0 rgba(22, 119, 255, 0.06);
        }

        .btn-primary:hover { background: var(--primary-hover); }

        .btn:disabled { opacity: 0.65; cursor: not-allowed; }

        .error-message {
            background: var(--error-bg);
            color: var(--error);
            border: 1px solid #ffccc7;
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            margin-bottom: 20px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            color: var(--text-secondary);
            font-size: 13px;
        }

        @media (max-width: 480px) {
            .login-card { padding: 28px 20px; }
            .logo-section h1 { font-size: 1.3em; }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo-icon">DK</div>
                <h1>Dake视频自动化工具</h1>
                <p>小红书/抖音视频下载 · 智能剪辑 · 一键导出</p>
            </div>
            
            {% if error %}
            <div class="error-message">
                <span>⚠️</span>
                <span>{{ error }}</span>
            </div>
            {% endif %}
            
            <form method="POST" action="/login">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" placeholder="请输入用户名" required autofocus>
                </div>
                
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" placeholder="请输入密码" required>
                </div>
                
                <button type="submit" class="btn btn-primary">
                    <span>🔐</span>
                    <span>登录</span>
                </button>
            </form>
            
            <div class="footer">
                <p>© 2026 Dake Video Auto - 仅供授权用户使用</p>
            </div>
        </div>
    </div>
</body>
</html>
