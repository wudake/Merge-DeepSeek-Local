upstream operations_api {
    server operations-api:3000;
}

upstream scripts_api {
    server scripts-api:8000;
}

upstream video_auto {
    server video-auto:5000;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # === OPERATIONS API (NestJS) ===
    location /api/v1/ {
        set $upstream_ops operations_api;
        proxy_pass http://$upstream_ops/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 60s;
    }

    # === SCRIPTS API (FastAPI) ===
    location /api/scripts/ {
        set $upstream_scripts scripts_api;
        proxy_pass http://$upstream_scripts/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 300s;
    }

    # === SCRIPTS WEBSOCKET ===
    location /ws/ {
        set $upstream_scripts scripts_api;
        proxy_pass http://$upstream_scripts/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # === VIDEO AUTO (Flask, iframe embed) ===
    location /video-auto/ {
        set $upstream_video video_auto;
        proxy_pass http://$upstream_video/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # === SCRIPTS OUTPUT FILES ===
    location /scripts-output/ {
        alias /var/www/scripts-output/;
        expires 1d;
    }

    # === FRONTEND SPA ===
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
